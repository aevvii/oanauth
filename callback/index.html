<!DOCTYPE html>
<html>
<head><title>OpenAudioNode - Spotify Auth</title></head>
<body>
<p>Redirecting...</p>
<script data-goatcounter="https://aevvi.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
var params = new URLSearchParams(window.location.search);
var code = params.get('code');
var error = params.get('error');
var state = params.get('state') || '';
var decoded = '';
try { decoded = atob(state.replace(/-/g,'+').replace(/_/g,'/')); } catch(e) {}
var parts = decoded.split('|');
var nodeHost = parts[0] || '';
var addNew = parts[1] === 'add_new';
if (nodeHost) {
  var url = 'http://' + nodeHost + '/api/spotify/callback';
  if (error) {
    url += '?error=' + encodeURIComponent(error);
  } else {
    url += '?code=' + encodeURIComponent(code || '');
    if (addNew) url += '&add_new=1';
  }
  window.location.replace(url);
} else {
  document.body.innerHTML = '<p>Error: missing node address. Please try again from your OpenAudioNode portal.</p>';
}
</script>
</body>
</html>
